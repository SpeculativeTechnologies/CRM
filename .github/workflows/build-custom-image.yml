name: Build and push custom image

# Builds the Twenty image (frontend + backend) from this fork and publishes
# it to GitHub Container Registry (GHCR). The VM then just pulls this image.
# Builds run on GitHub's large runners, avoiding the ~8GB frontend build OOM
# you'd hit on a small VM, and produce a native linux/amd64 image.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packages/twenty-docker/twenty/Dockerfile
          push: true
          # Tag with both :latest and the commit SHA so you can roll back.
          tags: |
            ghcr.io/${{ github.repository_owner }}/twenty:latest
            ghcr.io/${{ github.repository_owner }}/twenty:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
